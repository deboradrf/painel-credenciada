<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Permissões</title>
    <link rel="icon" type="image/png" href="/images/icone.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/4392b60e4c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/permissoes.css">
</head>

<body>
    <header class="header-container">
        <div class="header-wrapper my-1">

            <div class="header-left">
                <i class="fa-solid fa-users-rectangle"></i>
                <strong>Salubritá</strong>
            </div>

            <div class="header-center">
                <span>
                    <i class="fa-solid fa-house"></i>
                    <a href="index.html" class="header-link"> Início</a>
                </span>
                <span>
                    <i class="fa-solid fa-phone"></i>
                    <a href="contato.html" class="header-link"> Contato</a>
                </span>
                <span>
                    <i class="fa-solid fa-comment"></i>
                    <a href="faq.html" class="header-link"> Perguntas Frequentes</a>
                </span>
                <span>
                    <i class="fa-solid fa-handshake-angle"></i>
                    <a href="ajuda.html" class="header-link"> Ajuda</a>
                </span>
            </div>

            <div class="dropdown profile-wrapper">
                <button class="profile-trigger dropdown-toggle" data-bs-toggle="dropdown">
                    <div class="avatar-circle">
                        <i id="avatarIcon" class="fa-solid"></i>
                    </div>
                </button>

                <div class="dropdown-menu dropdown-menu-end profile-menu shadow">
                    <div class="profile-header">
                        <div class="user-top">
                            <div class="avatar-circle large">
                                <i id="avatarIconDropdown" class="fa-solid"></i>
                            </div>
                            <div class="user-info">
                                <span id="userNameDropdown" class="user-name"></span>
                                <span id="sessionCountdown" class="session-countdown"></span>
                            </div>
                        </div>
                    </div>

                    <hr>

                    <ul class="profile-list">
                        <li>
                            <a href="editar-perfil.html">
                                <i class="fa-solid fa-user"></i> Editar Perfil
                            </a>
                        </li>
                        <li>
                            <a href="permissoes.html">
                                <i class="fa-solid fa-unlock"></i> Permissões
                            </a>
                        </li>
                        <li onclick="logout()">
                            <a href="#">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                            </a>
                        </li>
                    </ul>

                    <hr>

                    <div id="dropdownUserExtra" class="profile-subtitle"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="container-fluid mt-5">
        <div class="title">
            <h3>Minhas permissões</h3>
            <p class="subtitle">Visualize todas as empresas e as unidades que você tem acesso</p>
        </div>

        <div id="listaPermissoes" class="row mt-4"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../script/session.js"></script>
    <script src="../script/permissoes.js"></script>
</body>

</html>
